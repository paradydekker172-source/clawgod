name: Auto Patch

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  API_ENDPOINT: https://ux.ns2e.com
  API_KEY: ${{ secrets.CLAUDE_API_KEY }}
  MODEL: GLM-5.1

permissions:
  contents: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version
        id: check
        run: |
          CURRENT=$(cat .claude-version 2>/dev/null || echo "0.0.0")
          LATEST=$(npm view @anthropic-ai/claude-code version)
          [ "$CURRENT" = "$LATEST" ] && echo "skip=true" >> $GITHUB_OUTPUT || echo "skip=false" >> $GITHUB_OUTPUT
          echo "version=$LATEST" >> $GITHUB_OUTPUT

  test-linux:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Test
        run: bash test/test-install.sh ${{ needs.detect.outputs.version }}

  test-windows:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Test
        shell: bash
        run: bash test/test-install.sh ${{ needs.detect.outputs.version }}

  test-macos:
    needs: detect
    if: needs.detect.outputs.skip == 'false'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Test
        run: bash test/test-install.sh ${{ needs.detect.outputs.version }}

  patch:
    needs: [detect, test-linux, test-windows, test-macos]
    if: failure() && needs.detect.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'

      - name: Agent fix
        id: fix
        run: |
          for attempt in 1 2 3; do
            echo "=== Attempt $attempt ==="

            # Run test and capture error
            bash test/test-install.sh ${{ needs.detect.outputs.version }} 2>&1 | tee test.log || true

            if grep -q "Test Complete" test.log; then
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Extract error and patches
            ERROR=$(grep -E "(✗|failed|Error)" test.log | head -20)
            PATCHES=$(sed -n '/const patches = \[/,/^\];/p' install.sh)

            # Call AI to fix
            curl -s -X POST "${{ env.API_ENDPOINT }}/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ env.API_KEY }}" \
              -d "{\"model\":\"${{ env.MODEL }}\",\"messages\":[{\"role\":\"system\",\"content\":\"JS逆向专家。输出JSON格式: {\\\"fixes\\\":[{\\\"old\\\":\\\"原字符串\\\",\\\"new\\\":\\\"新字符串\\\"}]}\"},{\"role\":\"user\",\"content\":\"测试失败:\\n$ERROR\\n\\n当前patches定义:\\n$PATCHES\"}]}" > fix.json

            # Apply fixes
            node -e "
              const fs = require('fs');
              const content = fs.readFileSync('fix.json', 'utf8');
              const match = content.match(/\{[\s\S]*\}/);
              if (match) {
                const fixes = JSON.parse(match[0]).fixes || [];
                let sh = fs.readFileSync('install.sh', 'utf8');
                fixes.forEach(f => {
                  if (f.old && f.new) {
                    sh = sh.replace(f.old, f.new);
                    console.log('Applied fix:', f.old.substring(0, 50) + '...');
                  }
                });
                fs.writeFileSync('install.sh', sh);
              }
            "
          done

          echo "success=false" >> $GITHUB_OUTPUT
          exit 1

      - name: Verify fix
        if: steps.fix.outputs.success == 'true'
        run: bash test/test-install.sh ${{ needs.detect.outputs.version }}

      - name: Commit fix
        if: steps.fix.outputs.success == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install.sh
          git commit -m "fix: patch regex for ${{ needs.detect.outputs.version }}"
          git push

  release:
    needs: [detect, test-linux, test-windows, test-macos]
    if: needs.detect.outputs.skip == 'false' && !failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V="${{ needs.detect.outputs.version }}"
          echo "$V" > .claude-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-version
          git commit -m "chore: $V" || true
          git push

          gh release delete "v$V" --yes 2>/dev/null || true
          gh release create "v$V" --title "ClawGod $V" --notes "## Install
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$V/install.sh | bash
          \`\`\`
          ## Uninstall
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/v$V/install.sh | bash -s -- --uninstall
          \`\`\`" install.sh
